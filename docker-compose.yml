services:
  web:
    build: .
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - /app/node_modules
    env_file:
      - .env
    # CHOKIDAR_USEPOLLING and WDS_SOCKET_PORT work around the .:/app bind mount 
    # above: CHOKIDAR_USEPOLLING makes the watcher poll instead of relying on
    # inotify (which doesn't reliably cross the bind mount?), 
    # WDS_SOCKET_PORT=0 makes HMR's websocket reconnect on whatever port loaded
    # the page instead of a hardcoded one.
    environment:
      - CHOKIDAR_USEPOLLING=true
      - WDS_SOCKET_PORT=0
    stdin_open: true
    tty: true
